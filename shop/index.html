<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

.sticky-top{
  position:sticky;
  top:0;
  z-index:999;
  background:#f5f5f5;
}

.header{
  background:#1e5631;
  color:white;
  text-align:center;
  padding:15px;
  font-weight:bold;
}

.impact{
  text-align:center;
  padding:10px;
  color:#2ecc71;
}

.info{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
  font-size:13px;
}

.search{ padding:10px; }
.search input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.card{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

.card img{
  width:100%;
  height:140px;
  object-fit:contain;
}

.name{ font-weight:bold; }
.desc{ font-size:12px; color:#666; }

.variant-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:8px;
  font-size:14px;
}

.qty-box{
  display:flex;
  align-items:center;
}

.qty-btn{
  background:#27ae60;
  color:white;
  border:none;
  width:30px;
  height:30px;
  border-radius:6px;
}

.qty{ margin:0 8px; }

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:10px;
}

button{
  width:100%;
  padding:15px;
  background:#2ecc71;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="sticky-top">
  <div class="header">🛒 CDO Frozen Products</div>

  <div class="impact">
    💚 Every purchase helps support Baby Leam’s therapy
  </div>

  <div class="info">
    📦 Order Guidelines:<br><br>
    1. Delivery fee will be shouldered by the buyer.<br>
    2. 1 day lead time.<br>
    3. Wait for confirmation before payment.<br>
    4. Send proof of payment.
  </div>

  <div class="search">
    <input placeholder="Search..." oninput="searchProducts(this.value)">
  </div>
</div>

<div id="products"></div>

<div class="footer">
  <div id="total">Total: ₱0</div>
  <button onclick="checkout()">Checkout via Messenger</button>
</div>

<script src="products.js"></script>

<script>
let allProducts = [];

function loadProducts(list){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p=>{
    let html = `
      <div class="card">
        <img src="${p.image}">
        <div class="name">${p.name}</div>
        <div class="desc">${p.description}</div>
    `;

    p.variants.forEach(v=>{
      html += `
        <div class="variant-row">
          <div>${v.label} - ₱${v.price}</div>

          <div class="qty-box">
            <button class="qty-btn" onclick="changeQty(this,-1,${v.price},'${p.name}','${v.label}')">-</button>
            <div class="qty" data-price="${v.price}" data-name="${p.name}" data-variant="${v.label}">0</div>
            <button class="qty-btn" onclick="changeQty(this,1,${v.price},'${p.name}','${v.label}')">+</button>
          </div>
        </div>
      `;
    });

    html += `</div>`;
    container.innerHTML += html;
  });
}

function changeQty(btn, change){
  let qtyEl = btn.parentElement.querySelector(".qty");
  let qty = parseInt(qtyEl.innerText);

  qty += change;
  if(qty < 0) qty = 0;

  qtyEl.innerText = qty;
  updateTotal();
}

function updateTotal(){
  let total = 0;

  document.querySelectorAll(".qty").forEach(el=>{
    let qty = parseInt(el.innerText);
    let price = parseInt(el.dataset.price);

    total += qty * price;
  });

  document.getElementById("total").innerText = "Total: ₱" + total;
}

function checkout(){
  let message = "🛒 ORDER DETAILS:%0A%0A";
  let total = 0;

  document.querySelectorAll(".qty").forEach(el=>{
    let qty = parseInt(el.innerText);
    let name = el.dataset.name;
    let variant = el.dataset.variant;
    let price = parseInt(el.dataset.price);

    if(qty > 0){
      message += `${name} (${variant}) x${qty}%0A`;
      total += qty * price;
    }
  });

  if(total === 0){
    alert("Select at least 1 product");
    return;
  }

  message += "%0ATotal: ₱" + total;
  message += "%0A%0AName:%0AAddress:%0A";

  window.location.href = "https://m.me/BabyLeamOfficial?text=" + message;
}

function searchProducts(q){
  let filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(q.toLowerCase())
  );
  loadProducts(filtered);
}

allProducts = products;
loadProducts(products);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gentle Warrior Shop</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
  padding-bottom:120px;
}

.container{
  max-width:500px;
  margin:auto;
}

.sticky-top{
  position:sticky;
  top:0;
  z-index:999;
  background:#f5f5f5;
}

.header{
  background:#1e4d2b;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.impact{
  text-align:center;
  padding:10px;
  font-size:14px;
  color:#27ae60;
}

.info{
  background:white;
  margin:10px;
  padding:14px;
  border-radius:12px;
  font-size:13px;
}

.tabs{
  display:flex;
  gap:6px;
  padding:10px;
}

.tab{
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#ddd;
}

.tab.active{
  background:#27ae60;
  color:white;
}

.search{
  margin:10px;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.grid{
  display:grid;
  gap:12px;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  display:flex;
  gap:10px;
}

.card img{
  width:90px;
  height:90px;
  object-fit:contain;
}

.details{
  flex:1;
}

.name{
  font-weight:bold;
}

.desc{
  font-size:12px;
  color:gray;
}

.price{
  color:#27ae60;
  font-weight:bold;
}

.toggle-btn{
  width:100%;
  margin-top:8px;
  padding:6px;
  border:none;
  background:#eee;
  border-radius:6px;
}

.variant-row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.qty-box{
  display:flex;
  gap:5px;
}

.qty-btn{
  background:#27ae60;
  color:white;
  border:none;
  width:26px;
  height:26px;
  border-radius:6px;
}

.qty{
  width:25px;
  text-align:center;
}

/* BOTTOM */
.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  padding:10px;
}

.checkout{
  width:100%;
  padding:12px;
  background:#27ae60;
  border:none;
  color:white;
  border-radius:8px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

.modal input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">

<div class="sticky-top">
<div class="header">🛒 CDO Frozen Products</div>

<div class="impact">
💚 Every purchase helps support Baby Leam’s therapy
</div>

<div class="info">
📦 <b>Order Guidelines</b><br><br>
1. Delivery fee will be shouldered by the buyer.<br>
2. 1 day lead time.<br>
3. Wait for confirmation before payment.<br>
4. Send proof of payment.
</div>

<div class="tabs">
<button class="tab active" onclick="filterCategory('All',this)">All</button>
<button class="tab" onclick="filterCategory('Frozen Meat',this)">Frozen</button>
<button class="tab" onclick="filterCategory('Bakery',this)">Bakery</button>
</div>

<div class="search">
<input type="text" placeholder="Search..." oninput="searchProducts(this.value)">
</div>
</div>

<div class="grid" id="grid"></div>

</div>

<div class="bottom-bar">
<div id="total">Total: ₱0</div>
<button class="checkout" onclick="openModal()">Checkout</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<h3>Checkout Details</h3>

<input type="text" id="name" placeholder="Name">
<input type="text" id="contact" placeholder="Contact Number">
<input type="text" id="address" placeholder="Address">

<button class="checkout" onclick="submitOrder()">Submit Order</button>

</div>
</div>

<script src="products.js"></script>

<script>
let allProducts = [];
let currentCategory = "All";

function loadProducts(list){
  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  list.forEach(p=>{
    grid.innerHTML += `
    <div class="card">
      <img src="${p.image}">
      <div class="details">
        <div class="name">${p.name}</div>
        <div class="desc">${p.description}</div>
        <div class="price">₱${p.variants[0].price}</div>

        <button class="toggle-btn" onclick="toggle(this)">Select Options</button>

        <div class="variants" style="display:none;">
        ${p.variants.map(v=>`
          <div class="variant-row">
            <span>${v.label} ₱${v.price}</span>
            <div class="qty-box">
              <button class="qty-btn" onclick="qty(this,-1)">-</button>
              <div class="qty" data-name="${p.name}" data-variant="${v.label}" data-price="${v.price}">0</div>
              <button class="qty-btn" onclick="qty(this,1)">+</button>
            </div>
          </div>
        `).join("")}
        </div>
      </div>
    </div>
    `;
  });
}

function toggle(btn){
  let box = btn.nextElementSibling;
  box.style.display = box.style.display === "none" ? "block":"none";
}

function qty(btn,val){
  let el = btn.parentElement.querySelector(".qty");
  let q = parseInt(el.innerText);
  q = Math.max(0,q+val);
  el.innerText = q;
  updateTotal();
}

function updateTotal(){
  let total=0;
  document.querySelectorAll(".qty").forEach(e=>{
    total += e.innerText * e.dataset.price;
  });
  document.getElementById("total").innerText = "Total: ₱"+total;
}

/* CATEGORY */
function filterCategory(cat,btn){
  currentCategory=cat;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");

  if(cat==="All"){
    loadProducts(allProducts);
  }else{
    loadProducts(allProducts.filter(p=>p.category===cat));
  }
}

/* SEARCH */
function searchProducts(q){
  let list = allProducts.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
  loadProducts(list);
}

/* MODAL */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function submitOrder(){

  let name=document.getElementById("name").value;
  let contact=document.getElementById("contact").value;
  let address=document.getElementById("address").value;

  if(!name || !contact || !address){
    alert("Please complete all fields");
    return;
  }

  let message="🛒 ORDER:%0A%0A";
  let total=0;

  document.querySelectorAll(".qty").forEach(e=>{
    let q=parseInt(e.innerText);
    if(q>0){
      message += `${e.dataset.name} (${e.dataset.variant}) x${q}%0A`;
      total += q*e.dataset.price;
    }
  });

  message += `%0ATotal: ₱${total}%0A`;
  message += `Name: ${name}%0AContact: ${contact}%0AAddress: ${address}`;

  window.location.href="https://m.me/BabyLeamOffcial?text="+message;
}

allProducts=products;
loadProducts(products);
</script>

</body>
</html>

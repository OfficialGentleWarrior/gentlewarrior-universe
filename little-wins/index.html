<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Little Wins</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <img src="assets/logo.png" class="logo" alt="Little Wins Logo">

    <h1>Little Wins</h1>

    <p>Celebrate every little win, no matter how small.</p>

    <button id="googleLogin">
        Continue with Google
    </button>

</div>

<script type="module">

import { signInWithGoogle } from "./js/auth.js";

document
  .getElementById("googleLogin")
  .addEventListener("click", signInWithGoogle);

</script>

</body>

</html>

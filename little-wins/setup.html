<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Setup Your Journey</title>

    <link rel="icon"
          type="image/png"
          href="assets/logo/little-wins-icon.png">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Welcome Screen -->

    <div
        id="welcomeScreen"
        class="container">

        <img
            src="assets/logo/little-wins-logo-full.png"
            class="logo"
            alt="Little Wins">

        <h2>
            Welcome! 💚
        </h2>

        <p class="subtitle">
            Every journey begins with a single step.
            <br>
            Let's create your journey.
        </p>

        <button id="continueSetup">
            Continue
        </button>

    </div>


    <!-- Step 1 -->

    <div
        id="step1"
        class="container hidden">

<div class="progress">

    <div class="progress-fill"></div>

</div>

        <h2>
            Who is this journey for?
        </h2>

        <p class="subtitle">
            Choose who this journey is for.
        </p>

        <button class="option-button">

    <span>
        👤 Myself
    </span>

    <span class="checkmark">
        ✓
    </span>

</button>

        <button class="option-button">

    <span>
        👶 My Child
    </span>

    <span class="checkmark">
        ✓
    </span>

</button>

<button class="option-button">

    <span>
        👨‍👩‍👧 Family Member
    </span>

    <span class="checkmark">
        ✓
    </span>

</button>

<button class="option-button">

    <span>
        ❤️ Someone I Care For
    </span>

    <span class="checkmark">
        ✓
    </span>

</button>

        <button
    id="step1Continue"
    disabled>
        </button>

    </div>


    <script
    type="module"
    src="js/setup.js">
</script>

</body>

</html>

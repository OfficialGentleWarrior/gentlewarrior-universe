<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Setup Your Journey</title>

    <link rel="icon"
          type="image/png"
          href="assets/logo/little-wins-icon.png">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Welcome Screen -->

    <div
        id="welcomeScreen"
        class="container">

        <img
            src="assets/logo/little-wins-logo-full.png"
            class="logo"
            alt="Little Wins">

        <h2>
            Welcome! 💚
        </h2>

        <p class="subtitle">
            Every journey begins with a single step.
            <br>
            Let's create your journey.
        </p>

        <button id="continueSetup">
            Continue
        </button>

    </div>


    <!-- Step 1 -->

    <div
        id="step1"
        class="container hidden">

        <h2>
            Who is this journey for?
        </h2>

        <p class="subtitle">
            Choose who this journey is for.
        </p>

        <button class="option-button">
            👤 Myself
        </button>

        <button class="option-button">
            👶 My Child
        </button>

        <button class="option-button">
            👨‍👩‍👧 Family Member
        </button>

        <button class="option-button">
            ❤️ Someone I Care For
        </button>

        <button id="step1Continue">
            Continue
        </button>

    </div>


    <script type="module">

        const welcomeScreen =
            document.getElementById("welcomeScreen");

        const step1 =
            document.getElementById("step1");

        document
            .getElementById("continueSetup")
            .addEventListener("click", () => {

                welcomeScreen.classList.add("hidden");
                step1.classList.remove("hidden");

            });

        document
            .getElementById("step1Continue")
            .addEventListener("click", () => {

                console.log("Next: Step 2");

            });

    </script>

</body>

</html>

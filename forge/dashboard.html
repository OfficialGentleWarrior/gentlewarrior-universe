<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard | FORGE</title>

    <meta name="description"
          content="FORGE Dashboard">

    <link rel="stylesheet"
          href="css/dashboard.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="dashboard-container">

    <!-- Header -->

    <header class="topbar">

        <div class="brand">

            <img src="assets/logo/forge-app-icon1.png"
                 alt="FORGE">

            <div>

                <h1>FORGE</h1>

                <p>Smart Link Platform</p>

            </div>

        </div>

        <button id="logoutBtn"
                class="logout-btn">

            <i class="fa-solid fa-right-from-bracket"></i>

            Logout

        </button>

    </header>



    <!-- Welcome -->

    <section class="welcome-card">

        <h2>

            Welcome back,

            <span id="userName">

                Loading...

            </span>

            👋

        </h2>

        <p>

            Ready to create smarter links today?

        </p>

    </section>



    <!-- Stats -->

    <section class="stats-grid">

        <div class="stat-card">

            <i class="fa-solid fa-coins"></i>

            <h3 id="credits">

                0

            </h3>

            <span>Credits</span>

        </div>

        <div class="stat-card">

            <i class="fa-solid fa-user"></i>

            <h3 id="role">

                User

            </h3>

            <span>Role</span>

        </div>

    </section>



    <!-- Quick Actions -->

    <section class="action-grid">

        <a href="#"
           class="action-card">

            <i class="fa-solid fa-link"></i>

            <span>Generate Link</span>

        </a>

        <a href="#"
           class="action-card">

            <i class="fa-solid fa-folder-open"></i>

            <span>My Links</span>

        </a>

        <a href="#"
           class="action-card">

            <i class="fa-solid fa-wallet"></i>

            <span>Buy Credits</span>

        </a>

    </section>



    <!-- Account -->

    <section class="account-card">

        <h3>

            Account Information

        </h3>

        <div class="info-row">

            <span>Email</span>

            <strong id="userEmail">

                Loading...

            </strong>

        </div>

        <div class="info-row">

            <span>Member Since</span>

            <strong id="memberSince">

                Loading...

            </strong>

        </div>

    </section>

</div>



<script type="module"
        src="js/dashboard.js"></script>

</body>

</html>

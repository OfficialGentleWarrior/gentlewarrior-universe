<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | FORGE</title>

    <meta name="description"
          content="Sign in to FORGE.">

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <main class="login-container">

        <div class="login-card">

            <img src="assets/logo/forge-app-icon1.png"
                 alt="FORGE"
                 class="logo">

            <h1>Welcome Back</h1>

            <p class="subtitle">
                Sign in to continue building smarter links.
            </p>

            <button class="facebook-btn">
                Continue with Facebook
            </button>

            <button class="google-btn">
                Continue with Google
            </button>

            <div class="divider">
                <span>OR</span>
            </div>

            <form>

                <input
                    type="email"
                    placeholder="Email Address"
                    required>

                <input
                    type="password"
                    placeholder="Password"
                    required>

                <button
                    type="submit"
                    class="login-btn">

                    Sign In

                </button>

            </form>

            <a href="#" class="forgot-password">
                Forgot Password?
            </a>

            <p class="signup-text">

                Don't have an account?

                <a href="signup.html">
                    Create Account
                </a>

            </p>

        </div>

    </main>

    <script src="js/login.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | FORGE</title>

    <meta name="description"
          content="Create your FORGE account and start building smarter links.">

    <link rel="stylesheet"
          href="css/login.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <!-- Logo -->

        <img src="assets/logo/forge-app-icon1.png"
             alt="FORGE"
             class="logo">

        <!-- Heading -->

        <h1>Create your account</h1>

        <p class="subtitle">
            Start creating smarter links in minutes.
        </p>

        <!-- Facebook -->

        <button class="facebook-btn"
                type="button">

            <i class="fa-brands fa-facebook-f"></i>

            Continue with Facebook

        </button>

        <!-- Google -->

        <button class="google-btn"
                type="button">

            <i class="fa-brands fa-google"></i>

            Continue with Google

        </button>

        <!-- Divider -->

        <div class="divider">

            <span>or</span>

        </div>

        <!-- Form -->

        <form id="signupForm">

            <!-- Full Name -->

            <div class="form-group">

                <label for="fullname">
                    Full Name <span class="required">*</span>
                </label>

                <input type="text"
                       id="fullname"
                       placeholder="Juan Dela Cruz"
                       autocomplete="name"
                       autofocus
                       required>

            </div>

            <!-- Email -->

            <div class="form-group">

                <label for="email">
                    Email Address <span class="required">*</span>
                </label>

                <input type="email"
                       id="email"
                       placeholder="name@example.com"
                       autocomplete="email"
                       required>

            </div>

            <!-- Password -->

            <div class="form-group">

                <label for="password">
                    Password <span class="required">*</span>
                </label>

                <input type="password"
                       id="password"
                       placeholder="Create a password"
                       autocomplete="new-password"
                       required>

                <small class="helper-text">
                    At least 8 characters
                </small>

            </div>

            <!-- Confirm Password -->

            <div class="form-group">

                <label for="confirmPassword">
                    Confirm Password <span class="required">*</span>
                </label>

                <input type="password"
                       id="confirmPassword"
                       placeholder="Re-enter your password"
                       autocomplete="new-password"
                       required>

            </div>

<div class="error-message" id="errorMessage"></div>

            <!-- Agreement -->

            <div class="agreement">

                <input
                    type="checkbox"
                    id="agree"
                    required>

                <label for="agree">

                    I have read and agree to the

                    <a href="terms.html"
                       target="_blank">

                        Terms &amp; Conditions

                    </a>

                    and

                    <a href="privacy.html"
                       target="_blank">

                        Privacy Policy

                    </a>,

                    and I consent to the collection and processing of my personal data in accordance with the

                    <strong>Data Privacy Act of 2012 (Republic Act No. 10173)</strong>.

                </label>

            </div>

            <!-- Submit -->

            <button type="submit"
                    class="login-btn">

                Create Account

            </button>

        </form>

        <!-- Bottom -->

        <p class="bottom-text">

            Already have an account?

            <a href="login.html">

                Log In

            </a>

        </p>

    </div>

</div>

<script src="js/signup.js"></script>

</body>

</html>

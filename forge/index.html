<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FORGE | Smarter links. Better results.</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ==========================

    =========================== -->

    <header>

        <div class="top-banner">

            <a href="#features">Features</a>

            <a href="#pricing">Pricing</a>

            <a href="#faq">FAQ</a>

            </button>

        </nav>

    </header>

    =========================== -->

    <section class="hero">

        <div class="hero-left">

            </p>

            <div class="hero-buttons">

                </button>

                    onclick="location.href='pricing.html'">

        </div>
